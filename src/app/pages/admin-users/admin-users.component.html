<div class="admin-container">
  <div class="custom-card shadow">
    <div class="card-header-custom">
      <h4><i class="fas fa-user-shield"></i> Registro de Nuevos Técnicos</h4>
      <p>Configure los accesos para el personal de soporte</p>
    </div>

    <div class="card-body-custom">
      <form (ngSubmit)="registrarUsuario()">
        <div class="form-grid">
          <div class="input-group-custom">
            <label>Nombre Completo</label>
            <input type="text" name="nombre" [(ngModel)]="nuevoNombre" placeholder="Ej: Juan Perez" required>
          </div>

          <div class="input-group-custom">
            <label>Nombre de Usuario (Login)</label>
            <input type="text" name="usuario" [(ngModel)]="nuevoUser" placeholder="jperez" required>
          </div>

          <div class="input-group-custom">
            <label>Contraseña Temporal</label>
            <input type="password" name="password" [(ngModel)]="nuevoPass" placeholder="••••••••" required>
          </div>

          <div class="action-group">
            <button type="submit" class="btn-main-action">
              <i class="fas fa-user-plus"></i> REGISTRAR TÉCNICO
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div class="list-section mt-5">
    <h5 class="section-title">Técnicos con Acceso al Sistema</h5>
    <div class="table-wrapper">
      <table class="modern-table">
        <thead>
          <tr>
            <th class="px-4">Nombre</th>
            <th>Usuario</th>
            <th class="text-center">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let u of listaUsuarios">
            <td class="px-4">
              <div class="user-name">{{u.nombre}}</div>
            </td>
            <td>
              <span class="user-pill">{{u.usuario || u.user}}</span>
            </td>
            <td class="text-center">
              <button class="btn-delete" (click)="quitarAcceso(u.id)">
                <i class="fas fa-trash-alt"></i> <span>ELIMINAR ACCESO</span>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

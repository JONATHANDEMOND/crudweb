<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow border-0">
        <div class="card-header bg-primary text-white text-center py-3">
          <h5 class="mb-0">Soporte Técnico - Pichincha</h5>
        </div>
        <div class="card-body p-4">
          <form (ngSubmit)="login()">
            <div class="form-group mb-3">
              <label class="font-weight-bold">Usuario</label>
              <input type="text" name="user" [(ngModel)]="user" class="form-control" placeholder="Ingrese su usuario">
            </div>
            <div class="form-group mb-4">
              <label class="font-weight-bold">Contraseña</label>
              <input type="password" name="pass" [(ngModel)]="pass" class="form-control" placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary btn-block shadow-sm">
              INGRESAR AL SISTEMA
            </button>
          </form>
          @if (error) {
            <div class="alert alert-danger mt-3 py-2 small text-center">
              Credenciales incorrectas
            </div>
          }
        </div>
      </div>
    </div>
  </div>
</div>

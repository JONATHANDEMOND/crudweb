<div class="login-page">
  <div class="login-card">

    <div class="login-header">
      <div class="logo-circle">
        <i class="fas fa-user-shield"></i> </div>
      <h2>Soporte Técnico</h2>
      <p>Gobierno Autónomo de Pichincha</p>
    </div>

    <div class="login-body">
      <form (ngSubmit)="login()">
        <div class="input-group-custom">
          <label><i class="fas fa-user"></i> Usuario</label>
          <input type="text" [(ngModel)]="user" name="user" placeholder="Ingrese su usuario" required>
        </div>

        <div class="input-group-custom">
          <label><i class="fas fa-lock"></i> Contraseña</label>
          <input type="password" [(ngModel)]="pass" name="pass" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-login">
          <span>INGRESAR AL SISTEMA</span>
          <i class="fas fa-arrow-right"></i>
        </button>
      </form>

      <div class="alert-error" *ngIf="error">
        <i class="fas fa-exclamation-circle"></i>
        Credenciales incorrectas, intente de nuevo.
      </div>
    </div>

    <div class="login-footer">
      <span>CSTM - 2026</span>
    </div>
  </div>
</div>
